<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1" />
    <meta
      name="theme-color"
      content="#000000" />
    <link
      rel="shortcut icon"
      type="image/svg+xml"
      href="/favicon.svg" />

    <!-- Primary Meta Tags -->
    <meta
      name="title"
      content="QREncode | LZArt" />
    <meta
      name="description"
      content="Simples, rápido, gratuito e 100% local!" />

    <!-- Open Graph / Facebook -->
    <meta
      property="og:type"
      content="website" />
    <meta
      property="og:url"
      content="https://qrcode.lzart.com.br/" />
    <meta
      property="og:title"
      content="QREncode | LZArt" />
    <meta
      property="og:description"
      content="Simples, rápido, gratuito e 100% local!" />
    <meta
      property="og:image"
      content="https://qrcode.lzart.com.br/pwa/wide.png" />

    <!-- Twitter -->
    <meta
      property="twitter:card"
      content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://qrcode.lzart.com.br/" />
    <meta
      property="twitter:title"
      content="QREncode | LZArt" />
    <meta
      property="twitter:description"
      content="Simples, rápido, gratuito e 100% local!" />
    <meta
      property="twitter:image"
      content="https://qrcode.lzart.com.br/pwa/wide.png" />
    <link
      rel="manifest"
      href="/manifest.json" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="tap">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
